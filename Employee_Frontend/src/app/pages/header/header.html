<div class="layout">

  <!-- SIDEBAR -->

  <div class="sidebar"
       [class.collapsed]="isCollapsed"
       [class.mobile-open]="isMobileOpen">

    <div class="sidebar-header">
      ADMIN
    </div>

    <ul class="nav-list">

  <!-- DASHBOARD (ALL) -->
  <li>
    <a routerLink="/dashboard"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-tachometer-alt"></i>
      <span>Dashboard</span>
    </a>
  </li>

  <!-- NEW EMPLOYEE (ALL) -->
  <li>
  <a routerLink="/new-employee/0"
     routerLinkActive="active-link"
     (click)="closeMobileSidebar()">

    <i class="fa fa-user-plus"></i>

    <span>
      @if(loggedEmpData.role === 'HR'){
        New Employee
      } @else {
        My Profile
      }
    </span>

  </a>
</li>

  <!-- HR ONLY MENU -->
  @if(isHR){

  <li>
    <a routerLink="/employees"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-users"></i>
      <span>Employees</span>
    </a>
  </li>

  <li>
    <a routerLink="/department"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-building"></i>
      <span>Departments</span>
    </a>
  </li>

  <li>
    <a routerLink="/designation"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-id-badge"></i>
      <span>Designations</span>
    </a>
  </li>

  <!-- <li>
    <a routerLink="/reports"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-file-alt"></i>
      <span>Reports</span>
    </a>
  </li>

  <li>
    <a routerLink="/settings"
       routerLinkActive="active-link"
       (click)="closeMobileSidebar()">
      <i class="fa fa-cog"></i>
      <span>Settings</span>
    </a>
  </li> -->

  }

  <!-- LOGOUT (ALL) -->
  <li>
    <a (click)="closeMobileSidebar(); onLogOut()">
      <i class="fa fa-sign-out-alt"></i>
      <span>Logout</span>
    </a>
  </li>

</ul>
  </div>

  <!-- ⭐ MOBILE OVERLAY -->

  @if (isMobileOpen) {
  <div
    class="mobile-overlay"
    (click)="closeMobileSidebar()">
  </div>
}

  <!-- MAIN -->

  <div class="main">

    <div class="topbar">

      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fa fa-bars"></i>
      </button>

      <h4 class="ms-3">Admin Dashboard</h4>

    </div>

    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
