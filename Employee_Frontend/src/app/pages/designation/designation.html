<div class="designation-wrapper">

    <div class="card designation-card">

        <!-- HEADER -->
        <div class="designation-header">
            Designation Management
        </div>

        <div class="designation-body">

            <!-- FORM -->
            <form [formGroup]="designationForm">

                <div class="row g-3 form-section align-items-end">

                    <!-- Department -->
                    <div class="col-12 col-md-4">

                        <label class="form-label">Department</label>

                        <select formControlName="departmentId" class="form-select">

                            <option [ngValue]="null" disabled>Select Department</option>

                            @for (item of departmentList; track item.departmentId) {
                                <option [ngValue]="item.departmentId">
                                    {{item.departmentName}}
                                </option>
                            }

                        </select>

                    </div>

                    <!-- Designation -->
                    <div class="col-12 col-md-4">

                        <label class="form-label">Designation Name</label>

                        <input type="text"
                               formControlName="designationName"
                               class="form-control"
                               placeholder="Enter designation name">

                    </div>

                    <!-- BUTTONS -->
                    <div class="col-12 col-md-4 button-group">

                        <button type="button"
                                (click)="onSave()"
                                class="btn"
                                [ngClass]="designationForm.value.designationId == 0 ? 'btn-success' : 'btn-warning'">

                            {{ designationForm.value.designationId == 0 ? 'Save' : 'Update' }}

                        </button>

                        <button type="button"
                                (click)="onReset()"
                                class="btn btn-secondary">
                            Reset
                        </button>

                    </div>

                </div>

            </form>

            <!-- TABLE -->
            <div class="table-responsive table-container">

                <table class="table table-hover table-bordered">

                    <thead class="table-dark">

                        <tr>
                            <th>#</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th style="width:150px">Actions</th>
                        </tr>

                    </thead>

                    <tbody>

                        @for (item of designationList; track item.designationId) {

                        <tr>

                            <td>{{$index + 1}}</td>

                            <td>{{item.departmentName}}</td>

                            <td>{{item.designationName}}</td>

                            <td class="actions">

                                <button class="btn btn-warning btn-sm"
                                        (click)="onEdit(item)">
                                    Edit
                                </button>

                                <button class="btn btn-danger btn-sm"
                                        (click)="onDelete(item.designationId)">
                                    Delete
                                </button>

                            </td>

                        </tr>

                        }

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
