<div class="container mt-1">

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Department Management</h5>
        </div>

        <div class="card-body">

            <!-- Form Section -->
            <div class="row align-items-end mb-4">

                <div class="col-3">
                    <label class="form-label">Department Name</label>
                    <input type="text" [(ngModel)]="newDepObj.departmentName" 
                           class="form-control" placeholder="Enter Department">
                </div>

                <div class="col-2">
                    <div class="form-check mt-4">
                        <input type="checkbox" [(ngModel)]="newDepObj.isActive" class="form-check-input">
                        <label class="form-check-label">Is Active</label>
                    </div>
                </div>

                <div class="col-2">
                    @if(newDepObj.departmentId == 0){
                        <button (click)="onSaveDept()" class="btn btn-success w-100">
                            Save
                        </button>
                    }@else{
                        <button (click)="onUpdateDept()" class="btn btn-warning w-100">
                            Update
                        </button>
                    }
                </div>

                <div class="col-2">
                    <button class="btn btn-secondary w-100" (click)="onReset()">
                        Reset
                    </button>
                </div>

            </div>

            <!-- Table -->
            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Department Name</th>
                            <th>Is Active</th>
                            <th style="width:150px">Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr *ngFor="let item of deptList(); let i = index">

                            <td>{{ i + 1 }}</td>

                            <td>{{ item.departmentName }}</td>

                            <td>
                                @if(item.isActive){
                                    <span class="badge bg-success">Active</span>
                                }@else{
                                    <span class="badge bg-danger">Inactive</span>
                                }
                            </td>

                            <td>
                                <button class="btn btn-sm btn-primary mx-2" (click)="onEdit(item)">
                                    Edit
                                </button>

                                <button class="btn btn-sm btn-danger" (click)="onDelete(item.departmentId)">
                                    Delete
                                </button>
                            </td>

                        </tr>

                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
